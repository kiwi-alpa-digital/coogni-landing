    <!-- Schema.org — FAQPage (for SGE) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Funciona Coogni para pacientes con Alzheimer, Parkinson y otras enfermedades neurodegenerativas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Coogni está diseñado específicamente para el seguimiento longitudinal de pacientes con cualquier enfermedad neurodegenerativa: Alzheimer, Parkinson, deterioro cognitivo leve (MCI), ELA, demencia frontotemporal y otras. Cada enfermedad tiene patrones de deterioro distintos y Coogni los adapta."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto tiempo tarda Coogni en detectar un patrón de deterioro cognitivo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Con una rutina diaria de 15-20 minutos de ejercicios cognitivos, Coogni puede identificar desviaciones significativas de la trayectoria basal en 3-6 semanas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo integrar Coogni con mi sistema de historia clínica electrónica (HCE)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En el plan Clínica y Enterprise sí. Ofrecemos integración via HL7/FHIR para los principales sistemas de HCE utilizados en España (Silicon, Selene, Mambrino)."
          }
        },
        {
          "@type": "Question",
          "name": "¿Los pacientes necesitan equipos o tecnología especial para hacer los ejercicios?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Los ejercicios cognitivos de Coogni funcionan en cualquier navegador web desde móvil, tablet u ordenador. No requiere app descargada ni hardware especial."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa con mis datos clínicos si cancelo mi suscripción?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tus datos son tuyos. Si cancelas, tienes 90 días para exportar toda la información en formatos estándar (PDF, CSV). Después, los datos se eliminan de nuestros servidores según la normativa RGPD."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo garantiza Coogni la seguridad y privacidad de los datos clínicos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Todos los datos están encriptados en tránsito (TLS 1.3) y en reposo (AES-256). Nuestros servidores están en la UE (Frankfurt) y cumplimos con el RGPD, la Ley de Protección de Datos española y la certificación ISO 27001."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuál es el tiempo de implementación y formación del equipo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Puedes empezar a usar Coogni en 15 minutos. La plataforma es intuitiva y no requiere formación técnica. Para equipos de más de 5 profesionales, ofrecemos sesión de onboarding gratuita de 1 hora."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa si la IA detecta un falso positivo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Coogni nunca toma decisiones clínicas — solo proporciona señales y recomendaciones. La alerta indica 'patrón atípico detectado' para que tú, como profesional, evalúes el contexto completo y decidas."
          }
        }
      ]
    }
    </script>
